category: ai
matchers-condition: and
matchers:
  - type: word
    words:
      - sk-ant-admin01-
    condition: or
  - type: regex
    regex:
      - '\bsk-ant-admin01-[A-Za-z0-9_\-]{86,100}AA\b'
  - type: entropy
    min: 3.5
extractors:
  - type: regex
    regex:
      - '\bsk-ant-admin01-[A-Za-z0-9_\-]{86,100}AA\b'
    group: 0
