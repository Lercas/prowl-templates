id: alibaba-access-key-secret
info:
  name: Alibaba Cloud Access Key Secret
  author: prowl
  severity: critical
  description: Alibaba Cloud (Aliyun) AccessKey secret (30-char base62 value in context).
  reference:
    - https://www.alibabacloud.com/help/en/ram/user-guide/create-an-accesskey-pair
  tags: alibaba,aliyun,cloud,credentials
category: cloud
matchers-condition: and
matchers:
  - type: word
    words:
      - accesskeysecret
      - secret
    condition: or
  - type: regex
    regex:
      - '(?i)(?:access[_\-]?key[_\-]?secret|accesskeysecret)["'' :=]{1,5}["'']?([A-Za-z0-9]{30})["'']?'
  - type: entropy
    min: 3.5
extractors:
  - type: regex
    regex:
      - '(?i)(?:access[_\-]?key[_\-]?secret|accesskeysecret)["'' :=]{1,5}["'']?([A-Za-z0-9]{30})["'']?'
    group: 1
