id: aws-secret-access-key
info:
  name: AWS Secret Access Key
  author: prowl
  severity: critical
  description: Amazon AWS secret access key (40-char base64-ish value in an AWS-keyed context).
  reference:
    - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html
  tags: aws,cloud,credentials
category: cloud
matchers-condition: and
matchers:
  - type: word
    words:
      - aws
      - secret
    condition: or
  - type: regex
    regex:
      - '(?i)aws(?:.{0,20})?(?:secret|access)?(?:.{0,20})?["'']?[A-Za-z0-9/+=]{40}["'']?'
      - '(?i)(?:aws_secret_access_key|aws_secret_key|secret_access_key)["'' :=]{1,5}["'']?([A-Za-z0-9/+=]{40})["'']?'
  - type: entropy
    min: 3.5
extractors:
  - type: regex
    regex:
      - '(?i)(?:aws_secret_access_key|aws_secret_key|secret_access_key)["'' :=]{1,5}["'']?([A-Za-z0-9/+=]{40})["'']?'
    group: 1
