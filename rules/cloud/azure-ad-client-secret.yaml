id: azure-ad-client-secret
info:
  name: Azure AD / Entra Client Secret
  author: prowl
  severity: high
  description: Azure Active Directory (Entra ID) application client secret value.
  reference:
    - https://learn.microsoft.com/en-us/entra/identity-platform/quickstart-register-app
  tags: azure,microsoft,cloud,credentials,auth
category: cloud
matchers-condition: and
matchers:
  - type: word
    words:
      - client_secret
      - clientsecret
      - AZURE_CLIENT_SECRET
    condition: or
  - type: regex
    regex:
      - '(?i)(?:client_secret|azure_client_secret|clientsecret)["'' :=]{1,5}["'']?([A-Za-z0-9\-_~.]{34,40})["'']?'
  - type: entropy
    min: 3.5
extractors:
  - type: regex
    regex:
      - '(?i)(?:client_secret|azure_client_secret|clientsecret)["'' :=]{1,5}["'']?([A-Za-z0-9\-_~.]{34,40})["'']?'
    group: 1
