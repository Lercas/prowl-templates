id: gcp-oauth-client-secret
info:
  name: Google OAuth Client Secret
  author: prowl
  severity: high
  description: Google OAuth 2.0 client secret (GOCSPX-prefixed or client_secret field).
  reference:
    - https://developers.google.com/identity/protocols/oauth2
  tags: gcp,google,cloud,credentials,auth
category: cloud
matchers-condition: and
matchers:
  - type: word
    words:
      - GOCSPX-
      - client_secret
    condition: or
  - type: regex
    regex:
      # Non-\b trailing boundary so a dash-terminated GOCSPX- secret isn't missed (value in group 1).
      # The "client_secret":"…" form ends in a literal quote and is unaffected.
      - '\b(GOCSPX-[A-Za-z0-9\-_]{28})(?:[^A-Za-z0-9\-_]|$)'
      - '(?i)"client_secret"\s*:\s*"([A-Za-z0-9\-_]{24})"'
  - type: entropy
    min: 3.2
extractors:
  - type: regex
    regex:
      - '\b(GOCSPX-[A-Za-z0-9\-_]{28})(?:[^A-Za-z0-9\-_]|$)'
    group: 1
