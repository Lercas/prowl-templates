id: gcp-service-account-private-key-id
info:
  name: GCP Service Account JSON Key
  author: prowl
  severity: critical
  description: Google service-account credentials JSON — the service_account type together with PEM private-key material (and/or the private_key_id), granting full impersonation of the service account.
  reference:
    - https://cloud.google.com/iam/docs/keys-create-delete
  tags: gcp,google,cloud,credentials,pki
category: cloud
matchers-condition: and
matchers:
  # Pre-filter on the distinctive structural tokens of a GCP SA key file.
  - type: word
    words:
      - service_account
      - private_key_id
      - '-----BEGIN PRIVATE KEY-----'
    condition: or
  # High-confidence: service_account type marker AND an embedded PEM key (either ordering).
  # Third alternative is the private_key_id (40 hex) alone — weaker but still GCP-specific.
  - type: regex
    regex:
      - '"type"\s*:\s*"service_account"[\s\S]{0,800}?-----BEGIN PRIVATE KEY-----'
      - '-----BEGIN PRIVATE KEY-----[\s\S]{0,800}?"type"\s*:\s*"service_account"'
      - '(?i)"private_key_id"\s*:\s*"[0-9a-f]{40}"'
  - type: entropy
    min: 3.0
extractors:
  # Prefer the private_key_id (stable, non-sensitive correlator); else fall back to the type marker.
  - type: regex
    regex:
      - '(?i)"private_key_id"\s*:\s*"([0-9a-f]{40})"'
      - '("type"\s*:\s*"service_account")'
    group: 1
