id: tencent-cloud-secret-id
info:
  name: Tencent Cloud Secret ID
  author: prowl
  severity: high
  description: Tencent Cloud (QCloud) API SecretId (AKID-prefixed identifier).
  reference:
    - https://www.tencentcloud.com/document/product/598/10138
  tags: tencent,qcloud,cloud,credentials
category: cloud
matchers-condition: and
matchers:
  - type: word
    words:
      - AKID
    condition: or
  - type: regex
    regex:
      - '\bAKID[A-Za-z0-9]{32}\b'
  - type: entropy
    min: 3.0
extractors:
  - type: regex
    regex:
      - '\bAKID[A-Za-z0-9]{32}\b'
    group: 0
