id: cassandra-credentials
info:
  name: Cassandra / ScyllaDB Credentials
  author: prowl
  severity: high
  description: Apache Cassandra / ScyllaDB driver credentials — a cassandra:// URI password or a password assigned alongside a Cassandra contact point.
  reference:
    - https://docs.datastax.com/en/developer/python-driver/latest/security/
  tags: cassandra,scylladb,db,connection-string,credentials
category: db
matchers-condition: and
matchers:
  - type: word
    words:
      - 'cassandra'
    condition: or
  - type: regex
    regex:
      - '(?i)cassandra://[^:@\s/]+:([^@\s/]{4,})@[^\s/]+'
      - '(?i)cassandra[^\n]{0,80}?(?:password|pwd)["'' :=]{1,5}["'']?([^\s"'',;]{6,})'
extractors:
  - type: regex
    regex:
      - '(?i)cassandra://[^:@\s/]+:([^@\s/]{4,})@[^\s/]+'
      - '(?i)cassandra[^\n]{0,80}?(?:password|pwd)["'' :=]{1,5}["'']?([^\s"'',;]{6,})'
    group: 1
