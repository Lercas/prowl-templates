id: generic-db-uri-password
info:
  name: Generic Database URI with Password
  author: prowl
  severity: high
  description: Generic database connection URI of the form scheme://user:password@host embedding an inline credential, for DB schemes not matched by a dedicated rule.
  reference:
    - https://datatracker.ietf.org/doc/html/rfc3986#section-3.2.1
  tags: db,connection-string,credentials,generic
category: db
matchers-condition: and
matchers:
  - type: word
    words:
      - 'sqlserver'
      - 'oracle'
      - 'snowflake'
      - 'couchbase'
      - 'mariadb'
      - 'trino'
    condition: or
  - type: regex
    regex:
      - '(?i)(?:db2|sqlserver|oracle|mariadb|presto|trino|snowflake|vertica|influxdb|druid|memsql|singlestore|couchbase|couchbases|crate|timescaledb|greenplum|sqlite|firebird|ydb|tarantool)://[^:@\s/]+:([^@\s/]{4,})@[^\s/]+'
extractors:
  - type: regex
    regex:
      - '(?i)(?:db2|sqlserver|oracle|mariadb|presto|trino|snowflake|vertica|influxdb|druid|memsql|singlestore|couchbase|couchbases|crate|timescaledb|greenplum|sqlite|firebird|ydb|tarantool)://[^:@\s/]+:([^@\s/]{4,})@[^\s/]+'
    group: 1
