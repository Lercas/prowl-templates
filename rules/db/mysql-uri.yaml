id: mysql-connection-uri
info:
  name: MySQL Connection URI with Password
  author: prowl
  severity: critical
  description: MySQL/MariaDB connection URI embedding a user:password credential.
  reference:
    - https://dev.mysql.com/doc/refman/8.0/en/connecting-using-uri-or-key-value-pairs.html
  tags: mysql,mariadb,db,connection-string,credentials
category: db
matchers-condition: and
matchers:
  - type: word
    words:
      - 'mysql://'
    condition: or
  - type: regex
    regex:
      - '(?i)mysql://[^:@\s/]+:([^@\s/]{4,})@[^\s/]+'
extractors:
  - type: regex
    regex:
      - '(?i)mysql://[^:@\s/]+:([^@\s/]{4,})@[^\s/]+'
    group: 1
