id: odbc-dsn-password
info:
  name: ODBC / DSN Connection String Password
  author: prowl
  severity: high
  description: Generic ODBC/DSN connection string with an inline Password= or Pwd= credential.
  reference:
    - https://learn.microsoft.com/en-us/sql/odbc/reference/syntax/sqldriverconnect-function
  tags: odbc,dsn,db,connection-string,credentials
category: db
matchers-condition: and
matchers:
  - type: word
    words:
      - 'password'
      - 'pwd'
    condition: or
  - type: regex
    regex:
      - '(?i)(?:^|;)\s*(?:password|pwd)=([^;\s"'']{4,})'
extractors:
  - type: regex
    regex:
      - '(?i)(?:^|;)\s*(?:password|pwd)=([^;\s"'']{4,})'
    group: 1
