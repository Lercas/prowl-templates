id: grafana-api-key
info:
  name: Grafana Cloud / Service Account Token
  author: prowl
  severity: high
  description: Grafana Cloud access policy token (glc_) or service account token (glsa_).
  reference:
    - https://grafana.com/docs/grafana-cloud/account-management/authentication-and-permissions/access-policies/
  tags: grafana,observability,credentials
category: observability
matchers-condition: and
matchers:
  - type: word
    words:
      - glc_
      - glsa_
    condition: or
  - type: regex
    regex:
      - '\bglc_[A-Za-z0-9+/=]{32,}\b'
      - '\bglsa_[A-Za-z0-9]{32}_[A-Fa-f0-9]{8}\b'
  - type: entropy
    min: 3.3
extractors:
  - type: regex
    regex:
      - '\bglc_[A-Za-z0-9+/=]{32,}\b'
      - '\bglsa_[A-Za-z0-9]{32}_[A-Fa-f0-9]{8}\b'
