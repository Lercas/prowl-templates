id: newrelic-license-key
info:
  name: New Relic License Key
  author: prowl
  severity: high
  description: New Relic license key (40-char value, often ending in NRAL) for data ingest.
  reference:
    - https://docs.newrelic.com/docs/apis/intro-apis/new-relic-api-keys/
  tags: newrelic,observability,credentials
category: observability
matchers-condition: and
matchers:
  - type: word
    words:
      - newrelic
      - new_relic
      - license
      - NEW_RELIC_LICENSE_KEY
    condition: or
  - type: regex
    regex:
      - '(?i)(?:new[_\-]?relic)[_\-]?license[_\-]?key["'' :=]{1,5}["'']?([a-f0-9]{36}NRAL|[a-f0-9]{40})["'']?'
  - type: entropy
    min: 3.0
extractors:
  - type: regex
    regex:
      - '(?i)(?:new[_\-]?relic)[_\-]?license[_\-]?key["'' :=]{1,5}["'']?([a-f0-9]{36}NRAL|[a-f0-9]{40})["'']?'
    group: 1
