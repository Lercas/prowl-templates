id: slack-legacy-token
info:
  name: Slack Legacy Token
  author: prowl
  severity: high
  description: Slack legacy workspace/refresh/session tokens (xoxa-, xoxr-, xoxs-).
  reference:
    - https://api.slack.com/authentication/token-types
  tags: slack,messaging,credentials
category: messaging
matchers-condition: and
matchers:
  - type: word
    words:
      - xoxa-
      - xoxr-
      - xoxs-
    condition: or
  - type: regex
    regex:
      - '\b(?:xoxa-|xoxr-|xoxs-)(?:[0-9]{10,13}-){1,3}[A-Za-z0-9]{24,40}\b'
  - type: entropy
    min: 3.3
extractors:
  - type: regex
    regex:
      - '\b(?:xoxa-|xoxr-|xoxs-)(?:[0-9]{10,13}-){1,3}[A-Za-z0-9]{24,40}\b'
