id: slack-signing-secret
info:
  name: Slack Signing Secret
  author: prowl
  severity: high
  description: Slack app signing secret (32-char hex) used to verify request signatures.
  reference:
    - https://api.slack.com/authentication/verifying-requests-from-slack
  tags: slack,messaging,credentials
category: messaging
matchers-condition: and
matchers:
  - type: word
    words:
      - slack_signing_secret
      - signing_secret
      - slack
    condition: or
  - type: regex
    regex:
      - '(?i)slack[_\-]?signing[_\-]?secret["'' :=]{1,5}["'']?([a-f0-9]{32})["'']?'
  - type: entropy
    min: 3.0
extractors:
  - type: regex
    regex:
      - '(?i)slack[_\-]?signing[_\-]?secret["'' :=]{1,5}["'']?([a-f0-9]{32})["'']?'
    group: 1
