id: twitch-client-secret
info:
  name: Twitch Client Secret
  author: prowl
  severity: high
  description: Twitch application client secret (30-char lowercase alnum) used in the OAuth client-credentials flow.
  reference:
    - https://dev.twitch.tv/docs/authentication/register-app
  tags: twitch,oauth,messaging,credentials
category: messaging
matchers-condition: and
matchers:
  # A Twitch secret is a prefix-less 30-char [a-z0-9] blob, so require a twitch cue within ~40 chars
  # of the value; a generic `client_secret = <30 lc>` branch would mislabel any provider's secret as Twitch.
  - type: word
    words:
      - twitch
    condition: or
  - type: regex
    regex:
      - '(?i)twitch[\w"'' .:=,/_-]{0,40}\b([a-z0-9]{30})\b'
  - type: entropy
    min: 3.0
extractors:
  - type: regex
    regex:
      - '(?i)twitch[\w"'' .:=,/_-]{0,40}\b([a-z0-9]{30})\b'
    group: 1
