id: dwolla-credentials
info:
  name: Dwolla Key / Secret Assignment
  author: prowl
  severity: high
  description: Dwolla API key or secret assigned in config or environment.
  reference:
    - https://developers.dwolla.com/api-reference/authorization
  tags: dwolla,payment,credentials
category: payment
matchers-condition: and
matchers:
  - type: word
    words:
      - dwolla
    condition: or
  - type: regex
    regex:
      - '(?i)dwolla[_\-]?(?:app[_\-]?)?(?:key|secret)["'']?\s*[:=]\s*["'']?([0-9A-Za-z]{50})\b'
  - type: entropy
    min: 3.5
extractors:
  - type: regex
    regex:
      - '(?i)dwolla[_\-]?(?:app[_\-]?)?(?:key|secret)["'']?\s*[:=]\s*["'']?([0-9A-Za-z]{50})\b'
    group: 1
