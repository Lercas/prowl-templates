id: finicity-credentials
info:
  name: Finicity App Key / Partner Secret
  author: prowl
  severity: high
  description: Finicity (Mastercard Open Banking) app key or partner secret assigned in config.
  reference:
    - https://developer.mastercard.com/open-banking-us/documentation/
  tags: finicity,payment,credentials
category: payment
matchers-condition: and
matchers:
  - type: word
    words:
      - finicity
    condition: or
  - type: regex
    regex:
      - '(?i)finicity[_\-]?(?:app[_\-]?key|partner[_\-]?secret|secret)["'']?\s*[:=]\s*["'']?([0-9a-f]{32})\b'
  - type: entropy
    min: 3.2
extractors:
  - type: regex
    regex:
      - '(?i)finicity[_\-]?(?:app[_\-]?key|partner[_\-]?secret|secret)["'']?\s*[:=]\s*["'']?([0-9a-f]{32})\b'
    group: 1
