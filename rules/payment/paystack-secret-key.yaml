id: paystack-live-secret-key
info:
  name: Paystack Live Secret Key
  author: prowl
  severity: critical
  description: Paystack live mode secret key (sk_live_) used to authenticate API calls.
  reference:
    - https://paystack.com/docs/api/authentication/
  tags: paystack,payment,credentials
category: payment
matchers-condition: and
matchers:
  - type: word
    words:
      - sk_live_
    condition: or
  - type: regex
    regex:
      - '\bsk_live_[0-9a-f]{40}\b'
  - type: entropy
    min: 3.2
extractors:
  - type: regex
    regex:
      - '\bsk_live_[0-9a-f]{40}\b'
---
id: paystack-live-public-key
info:
  name: Paystack Live Public Key
  author: prowl
  severity: medium
  description: Paystack live mode public key (pk_live_); public by design but signals a live integration.
  reference:
    - https://paystack.com/docs/api/authentication/
  tags: paystack,payment,credentials
category: payment
matchers-condition: and
matchers:
  - type: word
    words:
      - pk_live_
    condition: or
  - type: regex
    regex:
      - '\bpk_live_[0-9a-f]{40}\b'
  - type: entropy
    min: 3.0
extractors:
  - type: regex
    regex:
      - '\bpk_live_[0-9a-f]{40}\b'
