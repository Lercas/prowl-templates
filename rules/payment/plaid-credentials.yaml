id: plaid-access-token
info:
  name: Plaid Production Access Token
  author: prowl
  severity: critical
  description: Plaid production access token (access-production-...) for linked financial accounts.
  reference:
    - https://plaid.com/docs/api/tokens/
  tags: plaid,payment,credentials
category: payment
matchers-condition: and
matchers:
  - type: word
    words:
      - access-production-
    condition: or
  - type: regex
    regex:
      - '\baccess-production-[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b'
  - type: entropy
    min: 3.2
extractors:
  - type: regex
    regex:
      - '\baccess-production-[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b'
---
id: plaid-client-secret
info:
  name: Plaid Client ID / Secret Assignment
  author: prowl
  severity: high
  description: Plaid client_id or secret assigned in config or environment.
  reference:
    - https://plaid.com/docs/api/
  tags: plaid,payment,credentials
category: payment
matchers-condition: and
matchers:
  - type: word
    words:
      - plaid
    condition: or
  - type: regex
    regex:
      - '(?i)plaid[_\-]?(?:client[_\-]?id|secret)["'']?\s*[:=]\s*["'']?([0-9a-f]{24,32})\b'
  - type: entropy
    min: 3.2
extractors:
  - type: regex
    regex:
      - '(?i)plaid[_\-]?(?:client[_\-]?id|secret)["'']?\s*[:=]\s*["'']?([0-9a-f]{24,32})\b'
    group: 1
