id: shopify-access-token
info:
  name: Shopify Access Token
  author: prowl
  severity: critical
  description: Shopify app access token (shpat_) granting Admin API access to a store.
  reference:
    - https://shopify.dev/docs/apps/auth/oauth/getting-started
  tags: shopify,payment,credentials
category: payment
matchers-condition: and
matchers:
  - type: word
    words:
      - shpat_
    condition: or
  - type: regex
    regex:
      - '\bshpat_[a-fA-F0-9]{32}\b'
  - type: entropy
    min: 3.2
extractors:
  - type: regex
    regex:
      - '\bshpat_[a-fA-F0-9]{32}\b'
---
