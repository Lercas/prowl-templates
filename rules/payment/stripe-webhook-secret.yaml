id: stripe-webhook-secret
info:
  name: Stripe Webhook Signing Secret
  author: prowl
  severity: high
  description: Stripe webhook endpoint signing secret (whsec_) used to verify event payloads.
  reference:
    - https://docs.stripe.com/webhooks/signatures
  tags: stripe,payment,credentials
category: payment
matchers-condition: and
matchers:
  - type: word
    words:
      - whsec_
    condition: or
  - type: regex
    regex:
      - '\bwhsec_[A-Za-z0-9]{32,}\b'
  - type: entropy
    min: 3.5
extractors:
  - type: regex
    regex:
      - '\bwhsec_[A-Za-z0-9]{32,}\b'
