id: auth0-client-secret
info:
  name: Auth0 Client Secret
  author: prowl
  severity: high
  description: Auth0 application client secret (base64url value in an auth0 context) for the Auth0 APIs.
  reference:
    - https://auth0.com/docs/get-started/applications/application-settings
  tags: auth0,auth,credentials,token
category: auth
matchers-condition: and
matchers:
  - type: word
    words:
      - auth0
    condition: or
  - type: regex
    regex:
      - '(?i)auth0[a-z0-9_\- "'':=]{0,20}\b([A-Za-z0-9_-]{40,128})\b'
  - type: entropy
    min: 3.5
extractors:
  - type: regex
    regex:
      - '(?i)auth0[a-z0-9_\- "'':=]{0,20}\b([A-Za-z0-9_-]{40,128})\b'
    group: 1
