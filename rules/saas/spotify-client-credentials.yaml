id: spotify-client-credentials
info:
  name: Spotify Client ID / Secret Assignment
  author: prowl
  severity: high
  description: Spotify Web API client_id or client_secret (32-char base62, [A-Za-z0-9]) assigned in config or environment.
  reference:
    - https://developer.spotify.com/documentation/web-api/concepts/apps
  tags: spotify,saas,oauth,credentials
category: saas
matchers-condition: and
matchers:
  - type: word
    words:
      - spotify
    condition: or
  # Spotify client_id/secret are 32-char base62 ([A-Za-z0-9]; hex-only would mislabel md5/request-ids).
  # The shape is generic, so require a Spotify client_id/secret anchor on the same assignment.
  - type: regex
    regex:
      - '(?i)spotify[a-z0-9_\-]{0,24}(?:client[_\-]?id|client[_\-]?secret|secret)["'']?\s*[:=]\s*["'']?([A-Za-z0-9]{32})\b'
  - type: entropy
    min: 3.3
extractors:
  - type: regex
    regex:
      - '(?i)spotify[a-z0-9_\-]{0,24}(?:client[_\-]?id|client[_\-]?secret|secret)["'']?\s*[:=]\s*["'']?([A-Za-z0-9]{32})\b'
    group: 1
