id: terraform-cloud-token
info:
  name: Terraform Cloud API Token
  author: prowl
  severity: high
  description: Terraform Cloud / Enterprise API token (…atlasv1…) granting workspace and state access.
  reference:
    - https://developer.hashicorp.com/terraform/cloud-docs/users-teams-organizations/api-tokens
  tags: terraform,ci,credentials,token
category: ci
matchers-condition: and
matchers:
  - type: word
    words:
      - atlasv1
    condition: or
  - type: regex
    regex:
      - '\b[a-z0-9]{14}\.atlasv1\.[A-Za-z0-9_=-]{60,70}\b'
  - type: entropy
    min: 3.5
extractors:
  - type: regex
    regex:
      - '\b[a-z0-9]{14}\.atlasv1\.[A-Za-z0-9_=-]{60,70}\b'
    group: 0
