id: bitbucket-app-password
info:
  name: Bitbucket App Password
  author: prowl
  severity: high
  description: Bitbucket app password (ATBB prefix, or a credential assigned in a bitbucket context) used for Git and API auth.
  reference:
    - https://support.atlassian.com/bitbucket-cloud/docs/app-passwords/
  tags: bitbucket,vcs,credentials,token
category: vcs
matchers-condition: and
matchers:
  - type: word
    words:
      - ATBB
      - bitbucket
    condition: or
  - type: regex
    regex:
      - '\bATBB[A-Za-z0-9]{32,40}\b'
      - '(?i)bitbucket[a-z0-9_-]{0,20}(?:app[_-]?password|password|token)["'' :=]{1,5}["'']?([A-Za-z0-9]{20,40})["'']?'
  - type: entropy
    min: 3.2
extractors:
  - type: regex
    regex:
      - '\bATBB[A-Za-z0-9]{32,40}\b'
    group: 0
