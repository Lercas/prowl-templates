id: bitbucket-client-credentials
info:
  name: Bitbucket OAuth Client ID / Secret
  author: prowl
  severity: high
  description: Bitbucket OAuth consumer client id or client secret assigned in a bitbucket context.
  reference:
    - https://support.atlassian.com/bitbucket-cloud/docs/use-oauth-on-bitbucket-cloud/
  tags: bitbucket,vcs,credentials,token
category: vcs
matchers-condition: and
matchers:
  - type: word
    words:
      - bitbucket
      - client_secret
      - client_id
    condition: or
  - type: regex
    regex:
      - '(?i)bitbucket[a-z0-9_-]{0,20}(?:client[_-]?secret|secret)["'' :=]{1,5}["'']?([A-Za-z0-9_\-]{30,44})["'']?'
      - '(?i)bitbucket[a-z0-9_-]{0,20}(?:client[_-]?id|key)["'' :=]{1,5}["'']?([A-Za-z0-9]{18,32})["'']?'
  - type: entropy
    min: 3.2
extractors:
  - type: regex
    regex:
      - '(?i)bitbucket[a-z0-9_-]{0,20}(?:client[_-]?secret|secret)["'' :=]{1,5}["'']?([A-Za-z0-9_\-]{30,44})["'']?'
    group: 1
