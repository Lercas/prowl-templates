id: github-oauth-client-secret
info:
  name: GitHub OAuth App Client Secret
  author: prowl
  severity: high
  description: GitHub OAuth / App client secret (40-char hex) assigned in a github client context.
  reference:
    - https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/creating-an-oauth-app
  tags: github,vcs,credentials,token
category: vcs
matchers-condition: and
matchers:
  - type: word
    words:
      - github
      - client_secret
    condition: or
  - type: regex
    regex:
      - '(?i)github[a-z0-9_-]{0,20}(?:client[_-]?secret|secret)["'' :=]{1,5}["'']?([a-f0-9]{40})["'']?'
      - '(?i)(?:client[_-]?secret)["'' :=]{1,5}["'']?([a-f0-9]{40})["'']?'
  - type: entropy
    min: 3.0
extractors:
  - type: regex
    regex:
      - '(?i)github[a-z0-9_-]{0,20}(?:client[_-]?secret|secret)["'' :=]{1,5}["'']?([a-f0-9]{40})["'']?'
    group: 1
