id: npm-access-token
info:
  name: npm Access Token
  author: prowl
  severity: high
  description: npm registry access token (npm_) granting publish/read access to packages.
  reference:
    - https://docs.npmjs.com/about-access-tokens
    - https://github.blog/2021-09-23-announcing-npms-new-access-token-format/
  tags: npm,vcs,credentials,token
category: vcs
matchers-condition: and
matchers:
  - type: word
    words:
      - npm_
    condition: or
  - type: regex
    regex:
      - '\bnpm_[A-Za-z0-9]{36}\b'
  - type: entropy
    min: 3.2
extractors:
  - type: regex
    regex:
      - '\bnpm_[A-Za-z0-9]{36}\b'
    group: 0
