id: notion
info:
  name: Notion API
  reference: https://developers.notion.com/reference/get-self
match: [notion]
requests:
  - method: GET
    url: https://api.notion.com/v1/users/me
    headers:
      Authorization: "Bearer {{secret}}"
      Notion-Version: "2022-06-28"
    matchers:
      - type: status
        status: [200]
