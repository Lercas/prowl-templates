id: yandex-iam
info:
  name: Yandex Cloud IAM token
  reference: https://yandex.cloud/docs/iam/concepts/authorization/iam-token
match: [yandex, yc_, "t1."]
requests:
  - method: GET
    url: https://resource-manager.api.cloud.yandex.net/resource-manager/v1/clouds
    headers:
      Authorization: "Bearer {{secret}}"
    matchers:
      - type: status
        status: [200]
